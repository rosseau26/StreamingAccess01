<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Catálogo de Cuentas de Streaming y Diamantes Free Fire" />
  <title>Catálogo · Streaming & Free Fire</title>

  <!-- Fuentes -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,700&family=Inter+Tight:wght@400;500;600;700&display=swap" rel="stylesheet" />

  <!-- Iconos (Lucide via CDN) -->
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js" defer></script>

  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- ============== HEADER ============== -->
  <header class="header" data-testid="site-header">
    <div class="header-inner">
      <a href="#" class="brand" data-testid="brand-logo">
        <!-- Reemplaza el src por tu logo -->
        <img src="" alt="Logo" class="brand-logo" id="brandLogo" />
        <span class="brand-name">Catálogo</span>
      </a>

      <div class="header-badge" data-testid="availability-badge">
        <span class="dot" aria-hidden="true"></span>
        <span>Pregunta por disponibilidad</span>
      </div>
    </div>

    <!-- Tabs de categorías -->
    <nav class="tabs" role="tablist" aria-label="Categorías" data-testid="category-tabs">
      <button class="tab is-active" role="tab" data-category="streaming" data-testid="tab-streaming">
        Streaming
      </button>
      <button class="tab" role="tab" data-category="freefire" data-testid="tab-freefire">
        Free Fire
      </button>
      <button class="tab" role="tab" data-category="juegos" data-testid="tab-juegos">
        Juegos
      </button>
    </nav>
  </header>

  <!-- ============== MAIN ============== -->
  <main class="main">
    <section class="catalog">
      <div class="catalog-head">
        <h1 class="catalog-title" id="catalogTitle">Streaming</h1>
        <p class="catalog-sub" id="catalogSub">Selecciona un producto y agrégalo al carrito</p>
      </div>

      <!-- Grid de productos -->
      <div class="grid" id="productGrid" data-testid="product-grid">
        <!-- Las tarjetas se inyectan con JS -->
      </div>

      <!-- Estado vacío (para "Juegos") -->
      <div class="empty-state" id="emptyState" hidden data-testid="empty-state">
        <div class="empty-icon">
          <i data-lucide="package-open"></i>
        </div>
        <h2>Próximamente</h2>
        <p>Estamos preparando el catálogo de juegos. Vuelve pronto.</p>
      </div>
    </section>
  </main>

  <!-- ============== FOOTER ============== -->
  <footer class="footer" data-testid="site-footer">
    <p>&copy; <span id="year"></span> · Todos los derechos reservados</p>
  </footer>

  <!-- ============== FAB CARRITO ============== -->
  <button class="fab" id="fabCart" aria-label="Abrir carrito" data-testid="fab-cart">
    <i data-lucide="shopping-bag"></i>
    <span class="fab-count" id="fabCount" data-testid="fab-count">0</span>
  </button>

  <!-- ============== MODAL CARRITO ============== -->
  <div class="modal" id="cartModal" hidden aria-hidden="true" data-testid="cart-modal">
    <div class="modal-overlay" id="modalOverlay"></div>
    <div class="modal-panel" role="dialog" aria-modal="true" aria-labelledby="cartTitle">
      <header class="modal-head">
        <h2 id="cartTitle">Tu carrito</h2>
        <button class="icon-btn" id="closeModal" aria-label="Cerrar" data-testid="close-cart">
          <i data-lucide="x"></i>
        </button>
      </header>

      <ul class="cart-list" id="cartList" data-testid="cart-list">
        <!-- Items del carrito -->
      </ul>

      <div class="cart-empty" id="cartEmpty" data-testid="cart-empty">
        <i data-lucide="shopping-bag"></i>
        <p>Tu carrito está vacío</p>
      </div>

      <footer class="modal-foot" id="modalFoot" hidden>
        <div class="totals">
          <span>Total estimado</span>
          <strong id="cartTotal" data-testid="cart-total">$0.00</strong>
        </div>
        <div class="modal-actions">
          <button class="btn btn-ghost" id="clearCart" data-testid="clear-cart">Vaciar</button>
          <button class="btn btn-primary" id="sendWhatsapp" data-testid="send-whatsapp">
            <i data-lucide="send"></i>
            Cotizar por WhatsApp
          </button>
        </div>
      </footer>
    </div>
  </div>

  <script src="script.js" defer></script>
</body>
</html>
